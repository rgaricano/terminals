apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: terminals.openwebui.com
spec:
  group: openwebui.com
  scope: Namespaced
  names:
    plural: terminals
    singular: terminal
    kind: Terminal
    shortNames:
      - term
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - userId
                - apiKey
              properties:
                userId:
                  type: string
                  description: Open WebUI user ID.
                image:
                  type: string
                  default: "ghcr.io/open-webui/open-terminal:latest"
                  description: Container image for the terminal.
                apiKey:
                  type: string
                  description: API key for the terminal instance.
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 1
                  default: 1
                  description: Set to 0 to stop, 1 to run.
                storage:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    size:
                      type: string
                      default: "1Gi"
                    storageClass:
                      type: string
                      nullable: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Provisioning
                    - Running
                    - Stopped
                    - Error
                podName:
                  type: string
                serviceName:
                  type: string
                host:
                  type: string
                  description: Service FQDN reachable within the cluster.
                port:
                  type: integer
                  default: 8000
                message:
                  type: string
                  description: Human-readable status message.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: User
          type: string
          jsonPath: .spec.userId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .status.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
